<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Data About SLV</title>
    <style>
        body {
            background-color: black;
            color: purple;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .search-box {
            margin: 20px;
        }

        .search-box input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        .search-box button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: purple;
            color: white;
            cursor: pointer;
        }

        .text-box {
            margin: 15px;
            font-size: 18px;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .images a {
            margin: 10px;
        }

        .images img {
            width: 200px;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .images img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
<div class="container">

    <h1>Data About SLV</h1>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search data about SLV...">
        <button>Search</button>
    </div>

    <!-- Text Content (cleaned & neutral) -->
    <div class="text-box">سۆلاڤ کەسێکی ناسراوە لەسەر تۆڕە کۆمەڵایەتیەکان.</div>
    <div class="text-box">ناوبانگی بەهۆی چالاکییەکانی لە ئینستاگرام زیاد بووە.</div>
    <div class="text-box">لە کاتی کورتدا توانی شوێنی خۆی لە ناو فالووەراندا بکات.</div>
    <div class="text-box">نازناو و ناسنامەی تایبەتی خۆی درووست کردووە.</div>
    <div class="text-box">ئەمە بووە هۆکاری ئەوەی کە ناوی بڵاو بێتەوە.</div>

    <!-- Images -->
